services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: greenbus_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: greenbus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-greenbus_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/models/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d greenbus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ──────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: greenbus_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: greenbus
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-greenbus_secret}
      JWT_SECRET: ${JWT_SECRET:-changeme_use_64_char_hex_in_production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - backend_logs:/app/logs

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: greenbus_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  backend_logs:

networks:
  default:
    name: greenbus_network
